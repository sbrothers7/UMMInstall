<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ADOFAI Mod Manager</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
html, body { height: 100%; margin: 0; }
body {
  background: #212529;
  color: #dee2e6;
  font: 14px -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-user-select: none;
  display: flex;
  flex-direction: column;
}
header { padding: 20px 24px 6px; }
header h5 { color: #f8f9fa; margin: 0; }
header p { color: #adb5bd; font-size: 13px; margin: 4px 0 0; }
#log {
  flex: 1;
  overflow-y: auto;
  padding: 12px 24px;
  -webkit-user-select: text;
}
.line { display: flex; gap: 8px; padding: 4px 0; align-items: baseline; }
.line .icon { flex: 0 0 16px; text-align: center; font-weight: 600; }
.line.info  .icon { color: #6c757d; }
.line.ok    .icon { color: #51cf66; }
.line.error .icon { color: #ff6b6b; }
.line.info  .body { color: #dee2e6; }
.line.ok    .body { color: #b2f2bb; }
.line.error .body { color: #ffa8a8; font-weight: 500; }
.line.detail {
  color: #868e96;
  font-family: 'SF Mono', Menlo, monospace;
  font-size: 12px;
  white-space: pre-wrap;
  padding-left: 28px;
  border-left: 2px solid #495057;
  margin-left: 6px;
}
footer {
  padding: 12px 24px;
  background: #1a1d20;
  border-top: 1px solid #2c3034;
  display: flex;
  justify-content: flex-end;
}
#closeBtn:disabled { opacity: 0.45; cursor: not-allowed; }
</style>
</head>
<body>
<header>
  <h5>ADOFAI Mod Manager</h5>
  <p id="subtitle">Installing…</p>
</header>
<div id="log"></div>
<footer>
  <button id="closeBtn" class="btn btn-primary btn-sm" disabled onclick="closeWin()">Close</button>
</footer>
<script>
var logEl = document.getElementById('log');
var subEl = document.getElementById('subtitle');
var btnEl = document.getElementById('closeBtn');

var KNOWN_TYPES = { info:1, ok:1, error:1, detail:1, complete:1, failed:1, subtitle:1 };
var lastConsumedLength = 0;
var tail = '';
var done = false;

function escapeHTML(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function appendLine(raw) {
  // strip script(1)'s leading ^D + backspace sequences and pty CRs
  raw = raw.replace(/\r/g, '').replace(/\^D\x08+/, '').replace(/^\x08+/, '');
  // strip ANSI escape sequences (CSI colors, mode sets) from TUI output
  raw = raw.replace(/\x1b\[[\d;?]*[a-zA-Z]/g, '')
           .replace(/\x1b[=>cm78]/g, '')
           .replace(/\x1b[()][AB012]/g, '');
  if (raw === '' || /^\s*$/.test(raw)) return;

  var idx = raw.indexOf(':');
  var prefix = idx > 0 ? raw.substring(0, idx).toLowerCase() : '';
  var type, content;
  if (prefix && KNOWN_TYPES[prefix]) {
    type = prefix;
    content = raw.substring(idx + 1);
  } else {
    type = 'info';
    content = raw;
  }

  if (type === 'complete') {
    subEl.textContent = content || 'Done.';
    btnEl.disabled = false;
    btnEl.focus();
    done = true;
    return;
  }
  if (type === 'failed') {
    subEl.textContent = content || 'Installation failed.';
    btnEl.disabled = false;
    btnEl.focus();
    done = true;
    return;
  }
  if (type === 'subtitle') {
    subEl.textContent = content;
    return;
  }

  var icon = '';
  if (type === 'info')        icon = '›';
  else if (type === 'ok')     icon = '✓';
  else if (type === 'error')  icon = '✕';

  // Enable Close as soon as any error line shows up — user can bail without
  // waiting for the final complete/failed event.
  if (type === 'error') btnEl.disabled = false;

  var div = document.createElement('div');
  div.className = 'line ' + type;
  if (type === 'detail') {
    div.innerHTML = escapeHTML(content);
  } else {
    div.innerHTML = '<span class="icon">' + icon + '</span><span class="body">' + escapeHTML(content) + '</span>';
  }
  logEl.appendChild(div);
  logEl.scrollTop = logEl.scrollHeight;
}

function pollLog() {
  var req = new XMLHttpRequest();
  req.open('GET', 'installer_progress.log?t=' + Date.now(), true);
  req.onreadystatechange = function() {
    if (req.readyState !== 4) return;
    var text = req.responseText || '';
    if (text.length > lastConsumedLength) {
      var fresh = text.substring(lastConsumedLength);
      var combined = tail + fresh;
      var parts = combined.split('\n');
      tail = parts.pop();   // hold partial trailing line for next poll
      lastConsumedLength = text.length - tail.length;
      for (var i = 0; i < parts.length; i++) {
        if (parts[i].length > 0) {
          try { appendLine(parts[i]); } catch (e) {}
        }
      }
    }
    // Keep polling unless the file is gone AND we've already seen 'complete'/'failed'
    if (!done || text.length > 0) setTimeout(pollLog, 150);
  };
  req.onerror = function() { setTimeout(pollLog, 300); };
  try { req.send(); } catch (e) { setTimeout(pollLog, 300); }
}

function closeWin() { document.title = 'RESULT:CLOSE'; }

// Start polling once the page is parsed
if (document.readyState === 'complete' || document.readyState === 'interactive') {
  pollLog();
} else {
  document.addEventListener('DOMContentLoaded', pollLog);
}
</script>
</body>
</html>
